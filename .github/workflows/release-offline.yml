name: Release Offline Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6.0.7

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:offline

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md << 'EOF'
          ## Offline Build

          Download the `.html` file and verify integrity before use:
          ```
          shasum -a 256 -c bitspv-pay-offline-*.html.sha256
          ```
          Then open the `.html` file directly in your browser — no server needed.
          EOF
          gh release create ${{ github.ref_name }} \
            dist-offline/bitspv-pay-offline-*.html \
            dist-offline/bitspv-pay-offline-*.html.sha256 \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md
